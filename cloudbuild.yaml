steps:
  # 1. Build the unified Docker image with flexflow- prefix
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/flexflow-app:latest'
      - '.'

  # 2. Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/flexflow-app:latest'

  # 3. Deploy to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'flexflow-app'
      - '--image=$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/flexflow-app:latest'
      - '--region=$_GCP_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      # Configure Cloud SQL instance connection
      - '--add-cloudsql-instances=$_CLOUD_SQL_INSTANCE'
      # Set environment variables
      - '--set-env-vars=APP_ENV=production,DEBUG=false,DATABASE_URL=postgresql://$_DB_USER:$_DB_PASS@/$_DB_NAME?host=/cloudsql/$_CLOUD_SQL_INSTANCE,SECURITY_PEPPER=$_SECURITY_PEPPER,SECRET_KEY=$_SECRET_KEY,ALGORITHM=$_ALGORITHM,ACCESS_TOKEN_EXPIRE_MINUTES=$_ACCESS_TOKEN_EXPIRE_MINUTES,S3_ENDPOINT=$_S3_ENDPOINT,S3_ACCESS_KEY=$_S3_ACCESS_KEY,S3_SECRET_KEY=$_S3_SECRET_KEY,S3_BUCKET_NAME=$_S3_BUCKET_NAME,SUPPORT_EMAIL_DESTINATION=$_SUPPORT_EMAIL_DESTINATION,UPLOAD_DIR=$_UPLOAD_DIR'

images:
  - '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/flexflow-app:latest'

